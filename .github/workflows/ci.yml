name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Lint & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show PowerShell version
        shell: pwsh
        run: $PSVersionTable

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module PSScriptAnalyzer -MinimumVersion 1.22.0 -Force -Scope CurrentUser

      - name: Analyze
        shell: pwsh
        run: ./build.ps1 -Task Analyze

      - name: Test
        shell: pwsh
        run: ./build.ps1 -Task Test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: out/*.xml
          if-no-files-found: ignore

  publish:
    name: Publish to PSGallery
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package
        shell: pwsh
        run: ./build.ps1 -Task Analyze, Test, Package

      - name: Publish
        if: env.PSGALLERY_API_KEY != ''
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          $version = (Import-PowerShellDataFile ./src/AzureOperationsToolkit.psd1).ModuleVersion
          Publish-Module -Path "./out/AzureOperationsToolkit/$version" -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose
